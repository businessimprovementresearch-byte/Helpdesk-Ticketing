{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Reports</h3>
  <a href="{% url 'tickets:reports_export_excel' %}" class="btn btn-success">⬇ Export ke Excel</a>
</div>
<div class="row g-3">
  <div class="col-md-3"><div class="card bg-white p-3"><h6>Total Tiket</h6><h2>{{ summary.total }}</h2></div></div>
  <div class="col-md-3"><div class="card bg-white p-3"><h6>Open</h6><h2>{{ summary.open }}</h2></div></div>
  <div class="col-md-3"><div class="card bg-white p-3"><h6>Pending</h6><h2>{{ summary.pending }}</h2></div></div>
  <div class="col-md-3"><div class="card bg-white p-3"><h6>Closed</h6><h2>{{ summary.closed }}</h2></div></div>
</div>
{% endblock %}
